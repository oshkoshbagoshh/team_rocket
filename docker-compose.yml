name: kanjava

# Local development stack for the Kanjava Platform.
# WordPress core lives in the `wp_core` named volume (not committed); only the
# theme and plugin are bind-mounted from the repo so edits are live.
#
#   WordPress   -> http://localhost:8080  (run the install wizard once)
#   phpMyAdmin  -> http://localhost:8081  (server `db`, user kanjava / kanjava)
#   MailHog     -> http://localhost:8025  (catches all outbound mail)

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: kanjava
      MARIADB_USER: kanjava
      MARIADB_PASSWORD: kanjava
      MARIADB_ROOT_PASSWORD: kanjava_root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  wordpress:
    build: ./docker/wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: kanjava
      WORDPRESS_DB_USER: kanjava
      WORDPRESS_DB_PASSWORD: kanjava
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
    volumes:
      - wp_core:/var/www/html
      - ./wordpress/themes/kanjava-base:/var/www/html/wp-content/themes/kanjava-base
      - ./wordpress/plugins/kanjava-core:/var/www/html/wp-content/plugins/kanjava-core

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 64M

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  wp_core:
  db_data:
