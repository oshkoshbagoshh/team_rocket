name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Run JS-based actions on Node 24 (the runner default from 2026-06-16),
# ahead of the Node 20 action-runtime deprecation.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

defaults:
  run:
    working-directory: wordpress/themes/kanjava-base

jobs:
  php:
    name: PHP lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: wordpress/themes/kanjava-base/vendor
          key: composer-${{ hashFiles('wordpress/themes/kanjava-base/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHPCS (WordPress Coding Standards)
        run: composer lint

      - name: PHPUnit
        run: composer test

  build:
    name: Theme build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: wordpress/themes/kanjava-base/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build
